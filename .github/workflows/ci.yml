name: CI

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      NATASKS_NATS_URL: nats://127.0.0.1:4222

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Start NATS
        run: docker compose up -d nats

      - name: Run tests
        run: go test -v ./...

      - name: Stop NATS
        if: always()
        run: docker compose down -v
